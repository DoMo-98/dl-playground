name: Web validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/web-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/web-validation.yml'

jobs:
  web-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm lint

      - name: Build
        run: pnpm build
