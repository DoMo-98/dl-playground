name: Cleanup old Vercel production deployments

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      current_deployment_id:
        description: Optional active production deployment ID to preserve explicitly
        required: false
        type: string
      current_deployment_url:
        description: Optional active production deployment URL to preserve explicitly
        required: false
        type: string
      dry_run:
        description: Log deletions without deleting anything
        required: false
        default: false
        type: boolean

jobs:
  cleanup:
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'deployment_status' &&
        github.actor != 'dependabot[bot]' &&
        github.event.deployment_status.state == 'success' &&
        (github.event.deployment.environment == 'Production' || github.event.deployment.environment == 'production')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: vercel-prod-cleanup
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve cleanup context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            current_deployment_id='${{ github.event.inputs.current_deployment_id }}'
            current_deployment_url='${{ github.event.inputs.current_deployment_url }}'
          else
            current_deployment_id='${{ github.event.deployment.id }}'
            current_deployment_url='${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}'
          fi

          echo "current_deployment_id=$current_deployment_id" >> "$GITHUB_OUTPUT"
          echo "current_deployment_url=$current_deployment_url" >> "$GITHUB_OUTPUT"

      - name: Cleanup old production deployments conservatively
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_CURRENT_DEPLOYMENT_ID: ${{ steps.context.outputs.current_deployment_id }}
          VERCEL_CURRENT_DEPLOYMENT_URL: ${{ steps.context.outputs.current_deployment_url }}
          VERCEL_PRODUCTION_RETAIN_COUNT: '10'
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/vercel-prod-cleanup.mjs
