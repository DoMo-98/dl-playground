name: dl-playground merge trigger

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  trigger-openclaw:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Compute cycle eligibility
        id: filter
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          if [[ "$PR_AUTHOR" == "clawsdomoassistant-cell" ]]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "eligible=false" >> "$GITHUB_OUTPUT"

      - name: Skip non-cycle merge
        if: steps.filter.outputs.eligible != 'true'
        run: echo "Merged PR author is not eligible for the dl-playground cycle hook; skipping trigger."

      - name: Trigger OpenClaw hook
        if: steps.filter.outputs.eligible == 'true'
        env:
          OPENCLAW_DLP_HOOK_URL: ${{ secrets.OPENCLAW_DLP_HOOK_URL }}
          OPENCLAW_DLP_HOOK_TOKEN: ${{ secrets.OPENCLAW_DLP_HOOK_TOKEN }}
          GITHUB_EVENT_JSON: ${{ toJson(github.event) }}
        run: |
          set -euo pipefail
          if [[ -z "${OPENCLAW_DLP_HOOK_URL:-}" ]]; then
            echo "OPENCLAW_DLP_HOOK_URL secret is not set" >&2
            exit 1
          fi
          if [[ -z "${OPENCLAW_DLP_HOOK_TOKEN:-}" ]]; then
            echo "OPENCLAW_DLP_HOOK_TOKEN secret is not set" >&2
            exit 1
          fi
          printf '%s' "$GITHUB_EVENT_JSON" > /tmp/payload.json
          curl --fail --show-error --silent \
            --max-time 20 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            -X POST "$OPENCLAW_DLP_HOOK_URL" \
            -H "Authorization: Bearer $OPENCLAW_DLP_HOOK_TOKEN" \
            -H 'Content-Type: application/json' \
            --data @/tmp/payload.json
